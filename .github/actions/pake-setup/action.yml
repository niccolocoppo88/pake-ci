name: "Pake Setup"
description: "Install Rust + Node + pake-cli in CI"

inputs:
  node-version:
    description: "Node.js version"
    required: false
    default: "22"
  pake-version:
    description: "pake-cli version to install"
    required: false
    default: "latest"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Rust (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        if ! command -v cargo &> /dev/null; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
        fi
        cargo --version
        rustc --version

    - name: Install Rust (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if (-not (Get-Command cargo -ErrorAction SilentlyContinue)) {
          Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
          ./rustup-init.exe -y --default-toolchain stable --profile minimal
          echo "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
        }
        cargo --version
        rustc --version

    - name: Install pake-cli globally
      shell: bash
      run: |
        npm install -g pake-cli@${{ inputs.pake-version }}
        pake --version

    - name: Install build deps (Linux only)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libsoup-3.0-dev \
          libjavascriptcoregtk-4.1-dev \
          patchelf \
          build-essential \
          curl \
          wget \
          file \
          libssl-dev

    - name: Cache Cargo registry and target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ~/.cargo/bin
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-